<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>{{ h1 }}</title>
    <!-- Tailwind CDN for browser preview -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "system-ui", "sans-serif"],
            },
            fontSize: {
              "print-xs": ["12px", { lineHeight: "1.4" }],
              "print-sm": ["14px", { lineHeight: "1.5" }],
              "print-base": ["16px", { lineHeight: "1.6" }],
              "print-lg": ["20px", { lineHeight: "1.4" }],
              "print-xl": ["24px", { lineHeight: "1.3" }],
              "print-2xl": ["32px", { lineHeight: "1.2" }],
            },
          },
        },
      };
    </script>
    <!-- Inter Font -->
    <style>
      @font-face {
        font-family: "Inter";
        src: url("/fonts/Inter/web/Inter-ExtraLight.woff2") format("woff2");
        font-weight: 200;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "Inter";
        src: url("/fonts/Inter/web/Inter-Thin.woff2") format("woff2");
        font-weight: 100;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "Inter";
        src: url("/fonts/Inter/web/Inter-Light.woff2") format("woff2");
        font-weight: 300;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "Inter";
        src: url("/fonts/Inter/web/Inter-Regular.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "Inter";
        src: url("/fonts/Inter/web/Inter-Medium.woff2") format("woff2");
        font-weight: 500;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "Inter";
        src: url("/fonts/Inter/web/Inter-SemiBold.woff2") format("woff2");
        font-weight: 600;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "Inter";
        src: url("/fonts/Inter/web/Inter-Bold.woff2") format("woff2");
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }
    </style>
    <style type="text/tailwindcss">
      @layer base {
        @page {
          size: 297mm 210mm;
          margin: 0;
        }
        * {
          box-sizing: border-box;
        }
        body {
          margin: 0;
          padding: 0;
        }
      }

      @layer components {
        .pdf-page {
          @apply w-[297mm] h-[210mm] py-[3mm] px-[5mm] relative overflow-hidden bg-white;
          page-break-after: always;
        }
        .pdf-page:last-child {
          page-break-after: avoid;
        }
      }

      @layer utilities {
        .page-break {
          page-break-after: always;
        }
        .page-break-avoid {
          page-break-after: avoid;
        }
      }
    </style>
    <style>
      /* Browser preview styles */
      @media screen {
        body {
          background: white;
          padding: 0rem;
        }
        .pdf-page {
          margin: 0 auto 2rem auto;
          box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
      }
    </style>
  </head>
  <body class="font-sans bg-white">
    <div class="pdf-page">
      <!-- Global Header (Vidgyk x Brand Name) -->
      <div class="pb-4 mb-8">
        <h1 class="text-black">
          <span class="text-xl font-bold" style="font-family: Georgia, serif; font-weight: 100;">Vidgyk</span>
          <span class="font-extralight">x</span>
          <span class="text-xl font-bold">{{ global_header }}</span>
        </h1>
        <h3 class="text-gray-500 font-extralight">We make reviews work</h3>
      </div>

      <!-- Page H1 -->
      {% if h1 %}
      <h2 class="mb-4 font-semibold text-black text-print-xl">{{ h1 }}</h2>
      {% endif %}

      <!-- Optional Image -->
      {% if image %}
      <div class="mb-6">
        <img
          src="{{ image }}"
          alt="Page image"
          class="object-contain max-h-32"
        />
      </div>
      {% endif %}

      <!-- Content -->
      <div class="space-y-4 font-thin text-black text-print-base">
        {{ content }}
      </div>

      <!-- Warning -->
      {% if warning %}
      <div
        class="px-4 py-3 mt-6 text-orange-700 border border-orange-400 rounded bg-orange-50 text-print-sm"
      >
        {{ warning }}
      </div>
      {% endif %}

      <!-- Footer (only on last page) -->
      {% if is_last_page and global_footer %}
      <div
        class="absolute bottom-[8mm] left-[5mm] right-[5mm] pt-4 border-t border-gray-300 text-center text-print-xs text-gray-600"
      >
        {{ global_footer }}
      </div>
      {% endif %}

      <!-- Page Number -->
      <div
        class="absolute bottom-[8mm] right-[5mm] text-print-xs text-gray-700"
      >
        {{ page_num }}/{{ total_pages }}
      </div>
    </div>
  </body>
</html>
